version: '3.8'

services:
  backend:
    build: .
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      # Reemplazar con la IP privada de la EC2 de SQL Server en AWS
      DB_IP: 10.0.0.X  # Cambiar por IP privada real
      DB_USER: sa
      DB_PASSWORD: TuPassword123
    restart: unless-stopped
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
