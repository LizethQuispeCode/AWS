spring:
  application:
    name: backend-app
  
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=proyecto_db;encrypt=false;trustServerCertificate=true
    username: sa
    password: TuPassword123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.proyecto.backend: DEBUG
    org.hibernate.SQL: DEBUG
